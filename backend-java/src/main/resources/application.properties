spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Enable H2 web console to verify contents if needed
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# MongoDB Config (Atlas or Local)
# spring.data.mongodb.uri=mongodb+srv://<user>:<password>@cluster.mongodb.net/test
spring.data.mongodb.uri=mongodb://localhost:27017/partidas
