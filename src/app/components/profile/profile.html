<div class="tac-profile-container animated-enter">
  <div class="tac-header">
    <h1 class="tac-title">NET v2.0 // EXPEDIENTE CENTRAL</h1>
    <div class="tac-status-badge">
      SISTEMA EN LÍNEA // ACCESO OMEGA
    </div>
  </div>

  <div class="tac-body">
    <!-- Panel de Identidad -->
    <div class="tac-panel identity-panel">
      <label for="avatar-upload" class="avatar-uploader">
        <div class="avatar-frame">
          <ng-container *ngIf="editAvatarBase64() || stats()?.avatarBase64; else placeholder">
            <img [src]="editAvatarBase64() || stats()?.avatarBase64" class="avatar-img" />
          </ng-container>
          <ng-template #placeholder>
            <div class="visual-letter">{{ fallbackLetter }}</div>
          </ng-template>
          <div class="upload-overlay">
            <span class="upload-icon">📷</span>
            <span>CAMBIAR FOTO</span>
          </div>
        </div>
        <input id="avatar-upload" type="file" accept="image/png, image/jpeg" (change)="onFileSelected($event)" hidden />
      </label>

      <input 
        class="name-input" 
        type="text" 
        [value]="editDisplayName()" 
        (input)="updateDisplayName($event)" 
        placeholder="Tu Alias..." 
        maxlength="20" 
      />
      <div class="rank-label">OPERADOR · NIVEL {{ (stats()?.wins || 0) + 1 }}</div>
    </div>

    <!-- Panel Resumen de Despliegue -->
    <div class="tac-panel deployment-panel">
      <div class="deployment-header">RESUMEN DE DESPLIEGUE</div>
      <div class="deployment-stats">
        <div class="d-stat">
          <div class="d-icon-wrap">🚀</div>
          <div class="d-info">
            <span class="d-value">{{ stats()?.credits || 0 }}</span>
            <span class="d-label">CRÉDITOS ACUMULADOS</span>
          </div>
        </div>
        <div class="d-divider"></div>
        <div class="d-stat">
          <div class="d-icon-wrap">⚔️</div>
          <div class="d-info">
            <span class="d-value">{{ stats()?.wins || 0 }}</span>
            <span class="d-label">VICTORIAS REGISTRADAS</span>
          </div>
        </div>
        <div class="d-divider"></div>
        <div class="d-stat">
          <div class="d-icon-wrap">🛡️</div>
          <div class="d-info">
            <span class="d-value">{{ stats()?.alliedSupportCount || 0 }}</span>
            <span class="d-label">CARGAS DE APOYO</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Barra de Acciones -->
  <div class="tac-actions">
    <button class="action-btn btn-disconnect" (click)="logout.emit()">
      <span class="btn-dot"></span>
      DESCONECTAR
    </button>

    <div class="action-center-btns">
      <button class="action-btn btn-save" (click)="saveChanges()" [disabled]="isSaving()">
        <span class="btn-icon">💾</span>
        {{ isSaving() ? 'GUARDANDO...' : 'GUARDAR CAMBIOS' }}
      </button>
      <button class="action-btn btn-cancel" (click)="resetForm()">
        CANCELAR
      </button>
    </div>

    <button class="action-btn btn-back" (click)="back.emit()">
      ← REGRESAR AL MANDO
    </button>
  </div>
</div>
